name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # ✅ تم التحديث

      - name: Setup Node.js
        uses: actions/setup-node@v4  # ✅ تم التحديث
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4  # ✅ تم التحديث
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3  # لا يوجد v4 حتى الآن

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4  # ✅ تم التحديث (الإصلاح الرئيسي)
        with:
          name: syrian-fund-training-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30  # اختياري: مدة الاحتفاظ بالملف
